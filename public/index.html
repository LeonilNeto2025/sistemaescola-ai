<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema Escolar AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <div>
          <h1>Sistema Escolar</h1>
          <p>Gestão de matrículas, notas e histórico por perfil.</p>
        </div>
      </div>
      <button type="button" id="btnLogout" class="button button-ghost button-warn" hidden>
        <i data-lucide="log-out"></i> Sair
      </button>
    </header>

    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>
    <section id="mainContent" class="view-container"></section>

    <footer class="app-footer">
      <span>Design system azul, verde e amarelo. Monitor 15" otimizado.</span>
    </footer>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
